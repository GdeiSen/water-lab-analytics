name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            edition: licensed
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            edition: licensed
          - platform: ubuntu-22.04
            args: ""
            edition: licensed
          - platform: windows-latest
            args: ""
            edition: licensed
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            edition: community
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            edition: community
          - platform: ubuntu-22.04
            args: ""
            edition: community
          - platform: windows-latest
            args: ""
            edition: community

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.edition }} on ${{ matrix.platform }} ${{ matrix.args }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Configure community bundle
        if: matrix.edition == 'community'
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require("node:fs");
          const path = "src-tauri/tauri.conf.json";
          const config = JSON.parse(fs.readFileSync(path, "utf8"));
          config.productName = "Water Lab Analytics Community";
          config.identifier = "com.waterlab.analytics.community";
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WLA_LICENSE_REQUIRED: ${{ matrix.edition == 'community' && '0' || '1' }}
          WLA_LICENSE_PUBLIC_KEY: ${{ secrets.WLA_LICENSE_PUBLIC_KEY }}
          WLA_LICENSE_API_URL: ${{ secrets.WLA_LICENSE_API_URL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Water Lab Analytics ${{ github.ref_name }}
          releaseBody: Licensed and community release artifacts for Water Lab Analytics.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
